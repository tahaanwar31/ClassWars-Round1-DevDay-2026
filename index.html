<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Class Wars Round 2 | Level 1</title>
    <style>
        :root { --neon: #00ff41; --bg: #050505; --red: #ff3131; --blue: #0088ff; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; margin: 0; padding: 20px; overflow: hidden; }
        
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 2.2rem; text-shadow: 0 0 10px var(--neon); margin: 0; }
        .status-line { color: #666; font-size: 11px; letter-spacing: 2px; }

        .main-container { display: flex; gap: 20px; justify-content: center; align-items: flex-start; }
        .panel { background: #000; border: 1px solid var(--neon); display: flex; flex-direction: column; box-shadow: 0 0 15px #003b00; }
        .panel-header { background: #003b00; color: #fff; padding: 5px 10px; font-size: 11px; font-weight: bold; border-bottom: 1px solid var(--neon); }

        /* EDITOR: Scrollbar on the far right */
        textarea { 
            width: 550px; height: 460px; background: #000; color: var(--neon); 
            border: none; padding: 15px; font-size: 13px; outline: none;
            overflow-y: scroll; box-sizing: border-box; white-space: pre;
        }

        #grid-container { padding: 10px; background: #000; }
        #grid { 
            width: 400px; height: 400px; display: grid; position: relative;
            grid-template-columns: repeat(10, 40px); grid-template-rows: repeat(10, 40px);
            border: 1px solid #333;
        }
        .cell { border: 1px solid #1a1a1a; width: 40px; height: 40px; box-sizing: border-box; }

        /* Tank Model */
        #tank { width: 40px; height: 40px; position: absolute; transition: 0.15s linear; z-index: 100; pointer-events: none; }
        .tank-body { width: 28px; height: 24px; background: var(--neon); margin: 8px auto; border-radius: 3px; border: 1px solid #fff; position: relative; }
        .tank-turret { width: 12px; height: 12px; background: #006400; position: absolute; top: 5px; left: 7px; }
        .tank-barrel { width: 10px; height: 4px; background: var(--neon); position: absolute; top: 4px; right: -8px; }

        /* Nodes */
        .checkpoint { 
            width: 26px; height: 26px; background: var(--red); border-radius: 50%; 
            position: absolute; display: flex; align-items: center; justify-content: center;
            color: white; font-weight: bold; font-size: 11px; transform: translate(7px, 7px);
            box-shadow: 0 0 10px var(--red); cursor: crosshair; z-index: 50;
        }
        .checkpoint:hover::after { 
            content: attr(data-coords); position: absolute; top: -25px; 
            background: #fff; color: #000; padding: 2px 5px; font-size: 10px; border-radius: 3px; 
        }
        .checkpoint.hit { background: #fff; color: #000; box-shadow: 0 0 20px #fff; transition: 0.3s; }

        #finish-zone { 
            grid-column: 10; grid-row: 1 / span 10; background: rgba(0, 136, 255, 0.1);
            border-left: 2px dashed var(--blue); color: var(--blue); display: flex;
            align-items: center; justify-content: center; writing-mode: vertical-lr; font-size: 11px;
        }

        /* Terminal */
        #terminal-panel { width: 1000px; margin: 15px auto; border: 1px solid var(--neon); }
        #terminal { height: 100px; background: #000; padding: 10px; font-size: 12px; overflow-y: scroll; box-sizing: border-box; color: var(--neon); }

        button { background: var(--neon); color: #000; border: none; padding: 15px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        button:hover { background: #fff; box-shadow: 0 0 10px var(--neon); }
        .scanlines { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%); background-size: 100% 4px; pointer-events: none; z-index: 1000; }
    </style>
</head>
<body>
    <div class="scanlines"></div>
    <header>
        <h1>CLASS WARS: ROUND 2</h1>
        <div class="status-line">SYSTEM_LEVEL_01 // SECURE_SEQUENTIAL_NAVIGATION</div>
    </header>

    <div class="main-container">
        <div class="panel">
            <div class="panel-header">C++ SOURCE_EXPLOIT.CPP</div>
            <textarea id="cpp-editor" spellcheck="false"></textarea>
            <button id="run-btn" onclick="executeBreach()">INITIALIZE_SYSTEM_BREACH</button>
        </div>

        <div class="panel">
            <div class="panel-header">GRID_CORE_VISUALIZER</div>
            <div id="grid-container">
                <div id="grid">
                    <div id="tank">
                        <div class="tank-body">
                            <div class="tank-turret"><div class="tank-barrel"></div></div>
                        </div>
                    </div>
                    <div id="finish-zone">FINISH_ZONE</div>
                </div>
            </div>
        </div>
    </div>

    <div id="terminal-panel">
        <div class="panel-header">REMOTE_TERMINAL_LOG</div>
        <div id="terminal">root@system: awaiting execution...</div>
    </div>

    <script>
        const clientId = "9960fe994ec85a255ff9595cc7db7cd6";
        const clientSecret = "1c5778b22b1fd5bc107968fe0e15e3a0852fe050067c492ec1f635df4978df17";
        const CELL = 40;
        let checkpoints = [];

        // 1. Setup Grid & Random Nodes
        const grid = document.getElementById('grid');
        for (let i = 0; i < 100; i++) {
            const c = document.createElement('div');
            c.className = 'cell';
            grid.appendChild(c);
        }

        for (let x = 0; x <= 8; x++) {
            let y = Math.floor(Math.random() * 10);
            checkpoints.push({ x, y, hit: false });
            const cp = document.createElement('div');
            cp.className = 'checkpoint';
            cp.id = `cp-${x}`;
            cp.innerText = x + 1;
            cp.setAttribute('data-coords', `X:${x} Y:${y}`);
            cp.style.left = (x * CELL) + 'px';
            cp.style.top = (y * CELL) + 'px';
            grid.appendChild(cp);
        }

        // 2. Automatically write the C++ code with the CORRECT Y-coordinates
        const pathArrayString = checkpoints.map(cp => `{${cp.x}, ${cp.y}}`).join(', ');
        document.getElementById('cpp-editor').value = `#include <iostream>
using namespace std;

class Tank {
public:
    virtual void move() = 0;
    virtual void attack() = 0;
    virtual void defend() = 0;
};

class MyTank : public Tank {
private:
    int x = 0;
    int y = 0;
    // COORDINATES AUTO-GENERATED BY SYSTEM:
    int path[9][2] = {${pathArrayString}};

public:
    void move() override {
        for(int i = 0; i < 9; i++) {
            int tx = path[i][0];
            int ty = path[i][1];

            // Drive until both X and Y are correct
            while(x != tx || y != ty) {
                if(x < tx) x++;
                else if(x > tx) x--;
                else if(y < ty) y++;
                else if(y > ty) y--;
                
                cout << "STEP:" << x << "," << y << endl;
            }
            cout << "NODE_" << i+1 << "_SECURED" << endl;
        }
        
        // Final objective: Reach Column 9 (Finish Zone)
        while(x < 9) {
            x++;
            cout << "STEP:" << x << "," << y << endl;
        }
    }
    void attack() override {}
    void defend() override {}
};

int main() {
    MyTank t;
    t.move();
    return 0;
}`;

        // 3. Execution Logic
        async function executeBreach() {
            const btn = document.getElementById('run-btn');
            const term = document.getElementById('terminal');
            const code = document.getElementById('cpp-editor').value;
            const tank = document.getElementById('tank');

            btn.disabled = true;
            term.innerHTML = ">> UPLOADING CORE_EXPLOIT... VERIFYING SEQUENCE PATH.";
            
            let nextExpected = 0;
            let sequenceError = false;
            checkpoints.forEach((cp, i) => {
                cp.hit = false;
                document.getElementById(`cp-${i}`).classList.remove('hit');
            });
            tank.style.left = "0px"; tank.style.top = "0px";

            try {
                const res = await fetch('https://corsproxy.io/?https://api.jdoodle.com/v1/execute', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ clientId, clientSecret, script: code, language: "cpp17", versionIndex: "0" })
                });
                const data = await res.json();
                
                if (typeof data.output === 'string') {
                    term.innerText = data.output || ">> SUCCESS: LINK ESTABLISHED (NO OUTPUT).";
                    const steps = data.output.split('\n').filter(l => l.startsWith("STEP:"));
                    
                    let i = 0;
                    const mover = setInterval(() => {
                        if (i >= steps.length) {
                            clearInterval(mover);
                            finalize(steps[steps.length-1], nextExpected, sequenceError);
                            return;
                        }

                        const [cx, cy] = steps[i].split(":")[1].split(",").map(n => parseInt(n));
                        
                        // Hardware Boundary Clamping
                        const sx = Math.max(0, Math.min(9, cx));
                        const sy = Math.max(0, Math.min(9, cy));

                        tank.style.left = (sx * CELL) + "px";
                        tank.style.top = (sy * CELL) + "px";

                        // Sequence Validator
                        checkpoints.forEach((cp, idx) => {
                            if (sx === cp.x && sy === cp.y && !cp.hit) {
                                if (idx === nextExpected) {
                                    cp.hit = true;
                                    document.getElementById(`cp-${idx}`).classList.add('hit');
                                    nextExpected++;
                                    term.innerHTML += `<br>>> CAPTURED NODE_${idx+1}`;
                                } else if (idx > nextExpected) {
                                    sequenceError = true;
                                }
                            }
                        });
                        i++;
                    }, 120);
                } else {
                    term.innerText = ">> COMPILER ERROR: SYNTAX INVALID.";
                }
            } catch (e) { term.innerText = ">> CONNECTION ERROR."; }
            finally { btn.disabled = false; }
        }

        function finalize(lastStep, count, seqErr) {
            const term = document.getElementById('terminal');
            const finalX = lastStep ? parseInt(lastStep.split(":")[1].split(",")[0]) : 0;

            if (seqErr) term.innerHTML += `<br><span style="color:red">>> FAILURE: SEQUENCE VIOLATED. ACCESS REJECTED.</span>`;
            else if (count < 9) term.innerHTML += `<br><span style="color:red">>> FAILURE: DATA NODES MISSING.</span>`;
            else if (finalX < 9) term.innerHTML += `<br><span style="color:red">>> FAILURE: OUTSIDE EXTRACTION ZONE (COL 9).</span>`;
            else term.innerHTML += `<br><span style="color:white; background:green; padding:5px">>> ACCESS GRANTED. LEVEL 1 COMPLETE.</span>`;
        }
    </script>
</body>
</html>
